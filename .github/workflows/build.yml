name: Build & Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build library AAR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run RevealSlider unit tests
        run: ./gradlew :revealslider:test --no-daemon

      - name: Build RevealSlider release AAR
        run: ./gradlew :revealslider:assembleRelease --no-daemon

      - name: Upload test report
        if: always()   # upload even when tests fail so the report is accessible
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ github.sha }}
          path: revealslider/build/reports/tests/testDebugUnitTest/
          retention-days: 7

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: reveal-slider-${{ github.sha }}
          path: revealslider/build/outputs/aar/revealslider-release.aar
          retention-days: 7
